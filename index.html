<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On-Device Intelligence · NeurIPS 2026 Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
:root {
  --text: #1a1a1a; --muted: #555; --light: #888;
  --bg: #ffffff; --bg2: #f7f7f5;
  --accent: #1a6b5a; --accent-light: #e8f4f1;
  --border: #e0e0da; --link: #1a6b5a; --max: 860px;
}
body { font-family: 'IBM Plex Sans', system-ui, sans-serif; font-size: 16px; line-height: 1.75; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; }

/* NAV */
nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.96); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; }
.nav-inner { max-width: var(--max); margin: 0 auto; display: flex; align-items: center; height: 52px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
.nav-inner::-webkit-scrollbar { display: none; }
nav a { font-size: 13.5px; font-weight: 500; color: var(--muted); text-decoration: none; white-space: nowrap; padding: 0 1rem; height: 52px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
nav a:first-child { padding-left: 0; }
nav a:hover { color: var(--accent); }
nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

/* HERO */
#hero { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 5rem 1.5rem 4rem; text-align: center; }
.hero-inner { max-width: var(--max); margin: 0 auto; }
.hero-tag { display: inline-block; background: var(--accent-light); color: var(--accent); font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: .3rem .85rem; border-radius: 100px; margin-bottom: 1.5rem; }
#hero h1 { font-family: 'IBM Plex Serif', serif; font-size: clamp(1.9rem,4.5vw,3rem); font-weight: 600; line-height: 1.2; margin-bottom: .5rem; }
#hero h1 em { font-style: italic; color: var(--accent); }
.hero-sub { font-size: 1.05rem; color: var(--muted); margin-top: 1rem; max-width: 640px; margin-left: auto; margin-right: auto; }
.hero-meta { display: flex; flex-wrap: wrap; justify-content: center; gap: .4rem 1.4rem; margin-top: 2rem; font-size: 15px; color: var(--muted); }
.hero-meta strong { color: var(--text); font-weight: 500; }
.hero-meta-sep { color: var(--border); }
.hero-links { margin-top: 2rem; display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: .4rem; font-size: 14px; font-weight: 500; padding: .6rem 1.4rem; border-radius: 5px; text-decoration: none; transition: all .15s; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; border: 1.5px solid transparent; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #155248; border-color: #155248; }
.btn-outline { background: transparent; color: var(--accent); border-color: var(--accent); }
.btn-outline:hover { background: var(--accent-light); }

/* SECTIONS */
section { padding: 4.5rem 1.5rem; border-bottom: 1px solid var(--border); }
section:last-of-type { border-bottom: none; }
.section-inner { max-width: var(--max); margin: 0 auto; }
section h2 { font-family: 'IBM Plex Serif', serif; font-size: 1.7rem; font-weight: 600; color: var(--text); margin-bottom: 1.5rem; }
section p { color: var(--muted); margin-bottom: 1rem; }
section p:last-child { margin-bottom: 0; }
section ul, section ol { color: var(--muted); padding-left: 1.4rem; margin-bottom: 1rem; }
section li { margin-bottom: .3rem; }
section strong { color: var(--text); }
section em { font-style: italic; }
section a { color: var(--link); }
#about, #speakers, #submit, #organizers, #contact { background: var(--bg); }
#schedule, #topics, #dates { background: var(--bg2); }

/* SCHEDULE */
.schedule-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; margin-top: .5rem; }
.schedule-half h3 { font-size: 11.5px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: .9rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); }
.sched-row { display: flex; gap: 1rem; align-items: flex-start; padding: .6rem 0; border-bottom: 1px solid #f0f0ec; font-size: 14px; }
.sched-row:last-child { border-bottom: none; }
.sched-time { min-width: 110px; color: var(--light); font-size: 12.5px; flex-shrink: 0; padding-top: 2px; }
.sched-label { color: var(--text); }
.sched-label.highlight { color: var(--accent); font-weight: 500; }
.sched-label.soft { color: var(--muted); font-style: italic; }
.sched-label.gold { color: #8a6000; font-weight: 500; }

/* SPEAKERS / ORGANIZERS */
.speakers-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 2rem; margin-top: .5rem; }
.speaker-card { text-align: center; }
.speaker-photo { width: 108px; height: 108px; border-radius: 50%; background: var(--bg2); border: 2px solid var(--border); margin: 0 auto .85rem; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Serif', serif; font-size: 1.5rem; font-style: italic; color: var(--accent); overflow: hidden; }
.speaker-photo img { width: 100%; height: 100%; object-fit: cover; }
.speaker-name { font-weight: 600; font-size: 15px; margin-bottom: .25rem; }
.speaker-affil { font-size: 13px; color: var(--muted); line-height: 1.4; }

/* BIO TOGGLE */
.nav-logo { display: flex; align-items: center; padding-right: .5rem; border-bottom: none !important; }
.nav-logo img { height: 28px; width: auto; object-fit: contain; }
.hero-logo { margin-bottom: 1.5rem; }
.hero-logo img { height: 72px; width: auto; object-fit: contain; }
.bio-toggle { display: inline-block; margin-top: .6rem; font-size: 12px; font-weight: 500; color: var(--accent); background: none; border: 1px solid var(--accent); border-radius: 100px; padding: .2rem .75rem; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: background .15s, color .15s; }
.bio-toggle:hover { background: var(--accent-light); }
.bio-toggle.open { background: var(--accent); color: #fff; }
.bio-panel { margin-top: .75rem; text-align: left; overflow: hidden; max-height: 0; transition: max-height .35s ease, opacity .3s ease; opacity: 0; }
.bio-panel.visible { max-height: 300px; opacity: 1; }
.speaker-bio { font-size: 13px; color: var(--muted); line-height: 1.6; margin: 0; padding: .75rem; background: var(--bg2); border-radius: 6px; border-left: 2px solid var(--accent); }

/* TOPICS */
.topics-list { list-style: none; margin-top: .5rem; }
.topics-list > li { padding: 1.1rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 1.2rem; align-items: flex-start; }
.topics-list > li:last-child { border-bottom: none; }
.topic-num { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--accent); background: var(--accent-light); border-radius: 100px; padding: .2rem .65rem; flex-shrink: 0; margin-top: 3px; }
.topic-body h4 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: .25rem; }
.topic-body p { font-size: 14px; color: var(--muted); margin: 0; }

/* CFP */
.cfp-box { border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); padding: 2rem; margin-top: 1.5rem; }
.cfp-box h3 { font-family: 'IBM Plex Serif', serif; font-size: 1.15rem; font-weight: 600; margin-bottom: .8rem; color: var(--text); }
.cfp-box ul { padding-left: 1.3rem; color: var(--muted); font-size: 14.5px; margin-bottom: 1.5rem; }
.cfp-box ul li + li { margin-top: .3rem; }
.cfp-note { margin-top: 1rem; font-size: 13px; color: var(--light); }

/* DATES */
table.dates-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 14.5px; }
table.dates-table tr { border-bottom: 1px solid var(--border); }
table.dates-table tr:last-child { border-bottom: none; }
table.dates-table td { padding: .9rem .4rem; vertical-align: top; }
table.dates-table td:first-child { width: 58%; }
table.dates-table td:last-child { font-size: 13.5px; color: var(--accent); text-align: right; white-space: nowrap; }
table.dates-table tr.hl { background: #fffbec; }
table.dates-table tr.hl td:first-child { font-weight: 600; color: #6b4800; }
table.dates-table tr.hl td:last-child { color: #6b4800; font-weight: 600; }

/* FOOTER */
footer { background: #1a1a1a; color: #999; padding: 2.5rem 1.5rem; text-align: center; font-size: 13.5px; }
.footer-inner { max-width: var(--max); margin: 0 auto; }
footer em { display: block; font-style: italic; color: #666; margin-top: .4rem; font-size: 13px; }
footer a { color: #aaa; text-decoration: none; }
footer a:hover { color: #fff; }

/* LOADING */
#loading { position: fixed; inset: 0; background: var(--bg2); display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity .4s; }
#loading.done { opacity: 0; pointer-events: none; }
.loader-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; margin: 0 4px; animation: bounce .8s infinite alternate; }
.loader-dot:nth-child(2) { animation-delay: .2s; }
.loader-dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { from { transform: translateY(0); opacity:.4; } to { transform: translateY(-10px); opacity:1; } }

@media (max-width: 640px) {
  .schedule-cols { grid-template-columns: 1fr; }
  .sched-time { min-width: 84px; font-size: 11.5px; }
  .speakers-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<div id="loading"><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></div>

<nav><div class="nav-inner" id="nav-links"></div></nav>
<div id="page-body"></div>

<footer>
  <div class="footer-inner" id="footer-content"></div>
</footer>

<script>
// ── YAML frontmatter parser ────────────────────────────────────────────────
function parseMd(raw) {
  if (!raw.trimStart().startsWith('---')) return { fm: {}, body: raw };
  const parts = raw.split('---');
  if (parts.length < 3) return { fm: {}, body: raw };
  const fm   = jsyaml.load(parts[1]) || {};
  const body = parts.slice(2).join('---').trim();
  return { fm, body };
}

async function load(file) {
  const r = await fetch('content/' + file);
  if (!r.ok) throw new Error('Cannot load ' + file);
  return parseMd(await r.text());
}

function e(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(name) {
  const p = name.trim().split(' ');
  return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
}

// ── section renderers ──────────────────────────────────────────────────────

function renderHero(fm) {
  const logoBlock = fm.logo
    ? `<div class="hero-logo"><img src="${e(fm.logo)}" alt="Workshop logo"></div>`
    : '';
  return `
<div id="hero">
  <div class="hero-inner">
    ${logoBlock}
    <div class="hero-tag">${e(fm.badge)}</div>
    <h1>${e(fm.title)}<br><em>${e(fm.title_em)}</em></h1>
    <p class="hero-sub">${e(fm.subtitle)}</p>
    <div class="hero-meta">
      <span><strong>${e(fm.date)}</strong></span>
      <span class="hero-meta-sep">·</span>
      <span>${e(fm.venue)} <span style="color:var(--light);font-size:13px;">${e(fm.venue_note)}</span></span>
      <span class="hero-meta-sep">·</span>
      <span>${e(fm.attendees)}</span>
    </div>
    <div class="hero-links">
      <a href="${e(fm.cta_primary_url)}" class="btn btn-primary" target="_blank" rel="noopener">${e(fm.cta_primary_text)}</a>
      <a href="${e(fm.cta_secondary_url)}" class="btn btn-outline">${e(fm.cta_secondary_text)}</a>
    </div>
  </div>
</div>`;
}

function renderAbout(fm, body) {
  return `
<section id="about">
  <div class="section-inner">
    <h2>${e(fm.title)}</h2>
    ${marked.parse(body)}
  </div>
</section>`;
}

function renderSchedule(fm) {
  const row = item => {
    const cls = item.type ? ` ${item.type}` : '';
    return `<div class="sched-row"><span class="sched-time">${e(item.time)}</span><span class="sched-label${cls}">${e(item.label)}</span></div>`;
  };
  const note = fm.note ? `<p style="margin-top:1.5rem;font-size:13.5px;color:var(--light);">${e(fm.note)}</p>` : '';
  return `
<section id="schedule">
  <div class="section-inner">
    <h2>${e(fm.title)}</h2>
    <div class="schedule-cols">
      <div class="schedule-half"><h3>Morning</h3>${(fm.morning||[]).map(row).join('')}</div>
      <div class="schedule-half"><h3>Afternoon</h3>${(fm.afternoon||[]).map(row).join('')}</div>
    </div>
    ${note}
  </div>
</section>`;
}

function renderSpeakers(fm) {
  const cards = (fm.speakers||[]).map(s => {
    if (s.tba) return `
      <div class="speaker-card">
        <div class="speaker-photo"><span style="color:var(--light);font-style:normal;font-size:1.1rem;">TBA</span></div>
        <div class="speaker-name" style="color:var(--light);font-weight:400;font-style:italic;">To be announced</div>
      </div>`;
    const photo = s.photo
      ? `<img src="${e(s.photo)}" alt="${e(s.name)}" loading="lazy">`
      : `<span>${e(initials(s.name))}</span>`;
    const nameHtml = s.url
      ? `<a href="${e(s.url)}" style="color:inherit;text-decoration:none;">${e(s.name)}</a>`
      : e(s.name);
    const bioHtml = s.bio ? `
      <button class="bio-toggle" aria-expanded="false">Read bio</button>
      <div class="bio-panel" hidden><p class="speaker-bio">${e(s.bio.trim())}</p></div>` : '';
    return `
      <div class="speaker-card">
        <div class="speaker-photo">${photo}</div>
        <div class="speaker-name">${nameHtml}</div>
        <div class="speaker-affil">${e(s.affiliation)}</div>
        ${bioHtml}
      </div>`;
  });
  return `
<section id="speakers">
  <div class="section-inner">
    <h2>${e(fm.title)}</h2>
    <div class="speakers-grid">${cards.join('')}</div>
  </div>
</section>`;
}

function renderTopics(fm) {
  const items = (fm.topics||[]).map((t,i) => `
    <li>
      <span class="topic-num">${String(i+1).padStart(2,'0')}</span>
      <div class="topic-body"><h4>${e(t.title)}</h4><p>${e(t.description)}</p></div>
    </li>`);
  const intro = fm.intro ? `<p>${e(fm.intro)}</p>` : '';
  return `
<section id="topics">
  <div class="section-inner">
    <h2>${e(fm.title)}</h2>
    ${intro}
    <ul class="topics-list">${items.join('')}</ul>
  </div>
</section>`;
}

function renderSubmit(fm, body) {
  const criteria = (fm.criteria||[]);
  const note     = fm.conflict_note ? `<p class="cfp-note">${e(fm.conflict_note)}</p>` : '';
  const criteriaHtml = criteria.length ? `
    <div class="cfp-box">
      <h3>Evaluation Criteria</h3>
      <ul>${criteria.map(c => `<li>${e(c)}</li>`).join('')}</ul>
      <a href="${e(fm.openreview_url)}" class="btn btn-primary" target="_blank" rel="noopener">${e(fm.openreview_label)}</a>
      ${note}
    </div>` : `
    <div style="margin-top:1.5rem;">
      <a href="${e(fm.openreview_url)}" class="btn btn-primary" target="_blank" rel="noopener">${e(fm.openreview_label)}</a>
      ${note}
    </div>`;
  return `
<section id="submit">
  <div class="section-inner">
    <h2>${e(fm.title)}</h2>
    ${marked.parse(body)}
    ${criteriaHtml}
  </div>
</section>`;
}

function renderDates(fm) {
  const rows = (fm.dates||[]).map(d => {
    const hl = d.highlight ? ' class="hl"' : '';
    return `<tr${hl}><td>${e(d.label)}</td><td>${e(d.date)}</td></tr>`;
  });
  const note = fm.note ? `<p style="font-size:13.5px;color:var(--light);">${e(fm.note)}</p>` : '';
  return `
<section id="dates">
  <div class="section-inner">
    <h2>${e(fm.title)}</h2>
    ${note}
    <table class="dates-table">${rows.join('')}</table>
  </div>
</section>`;
}

function renderOrganizers(fm) {
  const cards = (fm.organizers||[]).map(o => {
    const photo = o.photo
      ? `<img src="${e(o.photo)}" alt="${e(o.name)}" loading="lazy">`
      : `<span>${e(o.initials || initials(o.name))}</span>`;
    const nameHtml = o.url
      ? `<a href="${e(o.url)}" style="color:inherit;text-decoration:none;">${e(o.name)}</a>`
      : e(o.name);
    return `
      <div class="speaker-card">
        <div class="speaker-photo">${photo}</div>
        <div class="speaker-name">${nameHtml}</div>
        <div class="speaker-affil">${e(o.role)}</div>
      </div>`;
  });
  const note = fm.note ? `<p style="margin-top:1.5rem;font-size:13.5px;color:var(--light);">${e(fm.note)}</p>` : '';
  return `
<section id="organizers">
  <div class="section-inner">
    <h2>${e(fm.title)}</h2>
    <div class="speakers-grid">${cards.join('')}</div>
    ${note}
  </div>
</section>`;
}

function renderContact(fm, body) {
  const contacts = (fm.contacts||[]).map(c =>
    `${e(c.name)} — <a href="mailto:${e(c.email)}">${e(c.email)}</a>`
  ).join('<br>');
  return `
<section id="contact">
  <div class="section-inner">
    <h2>${e(fm.title)}</h2>
    ${marked.parse(body)}
    ${contacts ? `<p>${contacts}</p>` : ''}
  </div>
</section>`;
}

// ── bio toggle ─────────────────────────────────────────────────────────────
function initBioToggles() {
  document.querySelectorAll('.bio-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = btn.nextElementSibling;
      const isOpen = btn.classList.contains('open');
      if (isOpen) {
        btn.classList.remove('open');
        btn.textContent = 'Read bio';
        btn.setAttribute('aria-expanded', 'false');
        panel.classList.remove('visible');
        setTimeout(() => { panel.hidden = true; }, 350);
      } else {
        panel.hidden = false;
        requestAnimationFrame(() => panel.classList.add('visible'));
        btn.classList.add('open');
        btn.textContent = 'Hide bio';
        btn.setAttribute('aria-expanded', 'true');
      }
    });
  });
}

// ── nav active on scroll ───────────────────────────────────────────────────
function initNav() {
  const sections = Array.from(document.querySelectorAll('section[id]'));
  const links    = document.querySelectorAll('nav a');
  function update() {
    let cur = '';
    sections.forEach(s => { if (window.scrollY >= s.offsetTop - 80) cur = s.id; });
    links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + cur));
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
}

// ── main ───────────────────────────────────────────────────────────────────
async function main() {
  const files = [
    ['hero.md',       null],
    ['about.md',      null],
    ['topics.md',     null],
    ['speakers.md',   null],
    ['submit.md',     null],
    ['dates.md',      null],
    ['organizers.md', null],
    ['contact.md',    null],
  ];

  const loaded = await Promise.all(files.map(([f]) => load(f)));

  const [hero, about, topics, speakers, submit, dates, organizers, contact] = loaded;

  // Build nav
  const logoHtml = hero.fm.logo
    ? `<a href="#" class="nav-logo"><img src="${e(hero.fm.logo)}" alt="Workshop logo"></a>`
    : '';
  document.getElementById('nav-links').innerHTML = logoHtml + `
    <a href="#about">About</a>
    <a href="#topics">Topics</a>
    <a href="#speakers">Keynote Speakers</a>
    <a href="#submit">Call for Papers</a>
    <a href="#dates">Important Dates</a>
    <a href="#organizers">Organizers</a>
    <a href="#contact">Contact</a>`;

  // Build page
  document.getElementById('page-body').innerHTML = [
    renderHero(hero.fm),
    renderAbout(about.fm, about.body),
    renderTopics(topics.fm),
    renderSpeakers(speakers.fm),
    renderSubmit(submit.fm, submit.body),
    renderDates(dates.fm),
    renderOrganizers(organizers.fm),
    renderContact(contact.fm, contact.body),
  ].join('');

  // Build footer
  document.getElementById('footer-content').innerHTML = `
    <div>NeurIPS 2026 Workshop &mdash; On-Device Intelligence: Foundation Models under Real-World Constraints</div>
    <em>${e(hero.fm.tagline)}</em>
    <div style="margin-top:1rem;font-size:12px;color:#555;">
      Organized by <a href="https://ethz.ch" target="_blank" rel="noopener">ETH Zurich</a>
      &amp; <a href="https://www.is.mpg.de" target="_blank" rel="noopener">MPI for Intelligent Systems</a>
    </div>`;

  // Wire up interactions
  initBioToggles();
  initNav();

  // Hide loader
  const loader = document.getElementById('loading');
  loader.classList.add('done');
  setTimeout(() => loader.remove(), 500);
}

main().catch(err => {
  document.getElementById('loading').innerHTML =
    `<p style="color:#c00;font-family:monospace;padding:2rem;">Failed to load content: ${err.message}<br><br>Make sure you're running a local server:<br><code>python -m http.server 8000</code></p>`;
});
</script>
